<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiobook Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for cleaner look */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #7c3aed;
            cursor: pointer;
            margin-top: -4px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #334155;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans flex justify-center selection:bg-violet-200 dark:selection:bg-violet-900 transition-colors duration-300">

    <!-- Adaptive App Container (Expands on Desktop) -->
    <div class="w-full md:max-w-4xl lg:max-w-5xl bg-white dark:bg-slate-900 shadow-2xl overflow-hidden flex flex-col relative h-screen transition-colors duration-300">
        
        <!-- Hidden Audio Element -->
        <audio id="audio-player"></audio>

        <!-- Hidden File Inputs -->
        <input type="file" accept="audio/*" id="file-upload" class="hidden" />
        <input type="file" webkitdirectory directory multiple id="folder-upload" class="hidden" />

        <!-- ================= LIBRARY VIEW ================= -->
        <div id="library-view" class="flex-1 overflow-y-auto pb-24 flex flex-col w-full">
            <!-- Header -->
            <div class="p-6 flex justify-between items-center bg-white dark:bg-slate-900 sticky top-0 z-10 transition-colors duration-300 border-b border-transparent dark:border-slate-800">
                <div class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity" onclick="showView('profile')">
                    <div id="header-avatar" class="w-10 h-10 bg-violet-100 dark:bg-violet-900/50 rounded-full flex items-center justify-center text-violet-600 dark:text-violet-400 font-bold overflow-hidden">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div>
                        <h2 class="text-sm text-gray-500 dark:text-gray-400 font-medium">Good Morning,</h2>
                        <p id="header-name" class="font-bold text-gray-900 dark:text-white">Reader</p>
                    </div>
                </div>
                <div class="flex gap-4 text-gray-600 dark:text-gray-300">
                    <button onclick="toggleLocalSearch()" class="hover:text-violet-600 transition-colors p-2 -mr-2">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <button class="hover:text-violet-600 transition-colors p-2">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Local Search Bar (Hidden by default) -->
            <div id="local-search-container" class="hidden px-6 pb-4 bg-white dark:bg-slate-900">
                <div class="relative">
                    <input type="text" id="local-search-input" oninput="filterLibrary()" placeholder="Search your library..." class="w-full bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 pl-10 outline-none focus:ring-2 focus:ring-violet-500 transition-all" />
                    <svg class="absolute left-3 top-3.5 text-gray-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>

            <!-- Title & Import Actions -->
            <div class="px-6 mb-8 mt-2">
                <h1 class="text-3xl font-bold mb-6 leading-tight text-slate-900 dark:text-white">Start Your Learning<br/>Journey Today 
                    <svg class="inline text-violet-600 dark:text-violet-400" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                </h1>
                
                <div class="flex flex-col sm:flex-row gap-3 mb-6">
                    <button onclick="document.getElementById('file-upload').click()" class="flex-1 bg-violet-50 dark:bg-violet-900/30 hover:bg-violet-100 dark:hover:bg-violet-900/50 text-violet-700 dark:text-violet-300 py-3 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Import File
                    </button>
                    <button onclick="document.getElementById('folder-upload').click()" class="flex-1 bg-violet-50 dark:bg-violet-900/30 hover:bg-violet-100 dark:hover:bg-violet-900/50 text-violet-700 dark:text-violet-300 py-3 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 transition-colors">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><polyline points="9 14 12 11 15 14"></polyline></svg> Import Folder
                    </button>
                </div>

                <!-- Dynamic Tags Container -->
                <div id="tags-container" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <span class="px-4 py-2 bg-gray-50 dark:bg-slate-800 text-gray-500 dark:text-gray-400 text-sm font-medium rounded-full whitespace-nowrap border border-gray-100 dark:border-slate-700">No tags yet</span>
                </div>
            </div>

            <!-- Book List (Grid layout applied for larger screens) -->
            <div class="px-6 flex-1">
                <h3 class="text-lg font-bold mb-4 text-slate-900 dark:text-white">Your Library</h3>
                
                <div id="books-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Books will be injected here -->
                    <div class="text-center py-10 bg-gray-50 dark:bg-slate-800 rounded-2xl border border-dashed border-gray-200 dark:border-slate-700 md:col-span-full">
                        <svg class="mx-auto text-gray-300 dark:text-gray-600 mb-2" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                        <p class="text-gray-500 dark:text-gray-400 font-medium text-sm">No audiobooks yet.</p>
                        <p class="text-gray-400 dark:text-gray-500 text-xs mt-1">Import a file or folder to begin.</p>
                    </div>
                </div>
            </div>
            
        </div>

        <!-- ================= PLAYER VIEW ================= -->
        <div id="player-view" class="hidden flex-1 flex flex-col bg-[#fcfbf9] dark:bg-slate-950 overflow-y-auto w-full relative transition-colors duration-300">
            <!-- Top Bar -->
            <div class="p-6 flex justify-between items-center max-w-md mx-auto w-full relative z-20">
                <button onclick="showView('library')" class="p-2 hover:bg-gray-200 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-900 dark:text-white">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="flex gap-4">
                    <button onclick="openSearchModal()" class="p-2 hover:bg-gray-200 dark:hover:bg-slate-800 rounded-full transition-colors text-gray-600 dark:text-gray-300" title="Edit Metadata">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    </button>
                    <button class="p-2 hover:bg-gray-200 dark:hover:bg-slate-800 rounded-full transition-colors text-gray-600 dark:text-gray-300">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Player Content (Constrained max-width for large screens) -->
            <div class="flex-1 flex flex-col items-center justify-center px-8 py-2 max-w-md mx-auto w-full">
                <!-- Book Cover -->
                <div class="relative w-full max-w-[280px] aspect-[3/4] mb-8">
                    <div class="absolute inset-0 bg-yellow-50 dark:bg-yellow-900/20 rounded-3xl -rotate-3 scale-105 shadow-sm"></div>
                    <img id="player-cover" src="" alt="Cover" class="absolute inset-0 w-full h-full object-cover rounded-3xl shadow-2xl z-10 bg-white dark:bg-slate-800" />
                </div>

                <!-- Title & Author -->
                <div class="text-center w-full mb-6">
                    <h2 id="player-title" class="text-2xl font-bold text-gray-900 dark:text-white mb-2 line-clamp-2"></h2>
                    <p id="player-author" class="text-gray-500 dark:text-gray-400 font-medium text-sm line-clamp-1"></p>
                    <p id="player-chapter-info" class="text-violet-600 dark:text-violet-400 text-xs font-bold mt-2 uppercase tracking-wider hidden"></p>
                </div>

                <!-- Audio Wave / Progress -->
                <div class="w-full mb-8">
                    <div id="waveform" class="h-8 w-full flex items-end justify-between gap-[2px] mb-4 opacity-40">
                        <!-- Waveform bars generated by JS -->
                    </div>

                    <div class="flex justify-between text-xs text-violet-600 dark:text-violet-400 font-semibold mb-2">
                        <span id="current-time-display">00:00</span>
                        <span id="duration-display">00:00</span>
                    </div>
                    
                    <input type="range" id="progress-bar" min="0" max="100" value="0" class="w-full h-1.5 bg-gray-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-violet-600" />
                </div>

                <!-- Controls -->
                <div class="w-full flex flex-col items-center gap-6 mb-8">
                    <div class="flex items-center justify-between w-full px-2">
                        <button onclick="changeChapter(-1)" id="btn-prev-chap" class="p-2 text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line></svg>
                        </button>
                        
                        <button onclick="skipTime(-60)" class="text-gray-400 hover:text-violet-600 dark:hover:text-violet-400 flex flex-col items-center transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 19 2 12 11 5 11 19"></polygon><polygon points="22 19 13 12 22 5 22 19"></polygon></svg>
                            <span class="text-[10px] font-bold mt-1">1m</span>
                        </button>
                        
                        <button onclick="skipTime(-10)" class="text-gray-600 dark:text-gray-400 hover:text-violet-600 dark:hover:text-violet-400 transition-colors">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"></path><path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path></svg>
                        </button>
                        
                        <button onclick="togglePlay()" id="btn-play-pause" class="w-16 h-16 flex items-center justify-center bg-gray-900 dark:bg-white text-white dark:text-slate-900 rounded-full hover:bg-black dark:hover:bg-gray-200 shadow-lg hover:scale-105 transition-all active:scale-95">
                            <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none" class="hidden"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        </button>
                        
                        <button onclick="skipTime(10)" class="text-gray-600 dark:text-gray-400 hover:text-violet-600 dark:hover:text-violet-400 transition-colors">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M21 13a9 9 0 1 1-3-7.7L21 8"></path></svg>
                        </button>

                        <button onclick="skipTime(60)" class="text-gray-400 hover:text-violet-600 dark:hover:text-violet-400 flex flex-col items-center transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>
                            <span class="text-[10px] font-bold mt-1">1m</span>
                        </button>
                        
                        <button onclick="changeChapter(1)" id="btn-next-chap" class="p-2 text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Bottom Toggles (Listen/Read & Speed) -->
                <div class="w-full flex items-center justify-between mt-auto mb-20 md:mb-4 px-2 text-sm">
                    <div class="flex bg-gray-100 dark:bg-slate-800 p-1 rounded-full border border-gray-200 dark:border-slate-700">
                        <button class="flex items-center gap-2 bg-white dark:bg-slate-700 px-4 py-1.5 rounded-full shadow-sm text-gray-900 dark:text-white font-bold text-xs">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg> Listen
                        </button>
                        <button class="flex items-center gap-2 px-4 py-1.5 rounded-full text-gray-500 dark:text-gray-400 font-medium text-xs hover:text-gray-800 dark:hover:text-white transition-colors">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg> Read
                        </button>
                    </div>
                    
                    <button onclick="togglePlaybackRate()" id="btn-speed" class="flex items-center gap-1 text-gray-500 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white font-medium text-xs bg-gray-100 dark:bg-slate-800 px-3 py-2 rounded-full transition-colors">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg> 
                        <span id="speed-display">1x speed</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= PROFILE VIEW ================= -->
        <div id="profile-view" class="hidden flex-1 overflow-y-auto pb-24 flex flex-col bg-slate-50 dark:bg-slate-950 w-full transition-colors duration-300">
            <div class="p-6 flex justify-between items-center bg-white dark:bg-slate-900 sticky top-0 z-10 border-b border-gray-100 dark:border-slate-800">
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Your Profile</h2>
                <button onclick="showView('library')" class="p-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-900 dark:text-white">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
            </div>
            
            <div class="p-6 max-w-lg mx-auto w-full">
                <!-- Avatar Preview -->
                <div class="flex justify-center mb-8">
                    <div id="profile-avatar-preview" class="w-24 h-24 bg-violet-100 dark:bg-violet-900/50 rounded-full flex items-center justify-center text-violet-600 dark:text-violet-400 font-bold text-2xl overflow-hidden border-4 border-white dark:border-slate-800 shadow-lg">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Display Name</label>
                        <input type="text" id="profile-name-input" value="Reader" class="w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500 transition-all" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Avatar Image URL (Optional)</label>
                        <input type="text" id="profile-avatar-input" placeholder="https://example.com/avatar.jpg" class="w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500 transition-all" />
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-violet-600 text-white py-3 rounded-xl font-bold hover:bg-violet-700 transition-colors mt-2">Save Profile Changes</button>
                </div>

                <div class="border-t border-gray-200 dark:border-slate-800 pt-6">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Settings</h3>
                    <div class="flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-xl border border-gray-100 dark:border-slate-700 shadow-sm">
                        <div class="flex items-center gap-3 text-slate-900 dark:text-white">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            <span class="font-medium">Dark Mode</span>
                        </div>
                        <button onclick="toggleDarkMode()" id="theme-toggle" class="w-12 h-6 rounded-full bg-gray-300 dark:bg-violet-600 relative transition-colors duration-300 focus:outline-none">
                            <span class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 dark:translate-x-6"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= BOTTOM NAVIGATION ================= -->
        <div class="fixed bottom-6 w-full max-w-4xl lg:max-w-5xl px-6 z-20 pointer-events-none flex justify-center">
            <div class="bg-gray-900 dark:bg-slate-800 text-gray-400 rounded-full p-2 flex justify-between items-center shadow-xl w-full max-w-md pointer-events-auto">
                <button onclick="showView('library')" id="nav-home" title="Home" class="p-3 bg-violet-600 text-white rounded-full transition-colors"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></button>
                <button onclick="toggleLocalSearch()" title="Search Library" class="p-3 hover:text-white transition-colors"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
                <!-- Changed to a book/library icon -->
                <button onclick="showView('library')" title="Your Library" class="p-3 hover:text-white transition-colors"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></button>
                <button onclick="showView('profile')" id="nav-profile" title="User Profile" class="p-3 hover:text-white transition-colors"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></button>
            </div>
        </div>

        <!-- ================= METADATA EDIT/SEARCH MODAL ================= -->
        <div id="search-modal" class="hidden absolute inset-0 bg-black/60 z-50 flex flex-col justify-end">
            <div class="bg-white dark:bg-slate-900 w-full h-[90%] md:h-[85%] rounded-t-3xl flex flex-col p-6 animate-in slide-in-from-bottom-full duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-slate-900 dark:text-white">Edit Book Info</h3>
                    <button onclick="closeSearchModal()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white bg-gray-100 dark:bg-slate-800 p-2 rounded-full transition-colors">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto pr-2 scrollbar-hide">
                    <!-- Manual Edit Form -->
                    <div class="bg-gray-50 dark:bg-slate-800 p-4 rounded-xl mb-6 border border-gray-100 dark:border-slate-700">
                        <h4 class="text-sm font-bold text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider">Manual Edit</h4>
                        <div class="space-y-3">
                            <input type="text" id="manual-title" placeholder="Book Title" class="w-full bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-violet-500 text-sm" />
                            <input type="text" id="manual-author" placeholder="Author Name" class="w-full bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-violet-500 text-sm" />
                            <input type="text" id="manual-cover" placeholder="Cover Image URL (https://...)" class="w-full bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-violet-500 text-sm" />
                            <button onclick="saveManualMetadata()" class="w-full bg-slate-900 dark:bg-violet-600 text-white font-bold py-2 rounded-lg hover:bg-black dark:hover:bg-violet-500 transition-colors text-sm">Save Changes</button>
                        </div>
                    </div>

                    <!-- Search Web Form -->
                    <h4 class="text-sm font-bold text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider">Or Search Web</h4>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="search-input" placeholder="Search title or author online..." class="flex-1 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500 transition-all" />
                        <button onclick="searchGoogleBooks()" id="btn-search" class="bg-violet-600 text-white px-5 rounded-xl font-bold hover:bg-violet-700 transition-colors flex items-center justify-center">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </button>
                    </div>

                    <div id="search-results" class="flex flex-col gap-3 pb-6">
                        <div class="text-center text-gray-400 dark:text-gray-500 mt-6 text-sm flex flex-col items-center">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-50"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            Search results will appear here. Click one to fill the form above.
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- State ---
        let state = {
            user: {
                name: "Reader",
                avatar: ""
            },
            books: [],
            activeBookId: null,
            isPlaying: false,
            playbackRate: 1,
            waveformHeights: Array.from({length: 40}, () => Math.random() * 100),
            localSearchQuery: "",
            isDarkMode: false
        };

        // --- DOM Elements ---
        const audioEl = document.getElementById('audio-player');
        const booksContainer = document.getElementById('books-container');
        const tagsContainer = document.getElementById('tags-container');
        
        const views = {
            library: document.getElementById('library-view'),
            player: document.getElementById('player-view'),
            profile: document.getElementById('profile-view')
        };
        const searchModal = document.getElementById('search-modal');
        
        // Progress elements
        const progressBar = document.getElementById('progress-bar');
        const currentTimeDisplay = document.getElementById('current-time-display');
        const durationDisplay = document.getElementById('duration-display');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        
        // --- Navigation / Views ---
        function showView(viewName) {
            Object.keys(views).forEach(v => {
                if (views[v]) views[v].classList.add('hidden');
            });
            views[viewName].classList.remove('hidden');

            // Reset nav button active states
            document.getElementById('nav-home').className = "p-3 hover:text-white transition-colors";
            document.getElementById('nav-profile').className = "p-3 hover:text-white transition-colors";

            if (viewName === 'library') {
                document.getElementById('nav-home').className = "p-3 bg-violet-600 text-white rounded-full transition-colors";
                renderLibrary(); // Ensure library handles re-renders correctly
            } else if (viewName === 'profile') {
                document.getElementById('nav-profile').className = "p-3 bg-violet-600 text-white rounded-full transition-colors";
                updateProfileUI();
            }
        }

        // --- User Profile ---
        function updateProfileUI() {
            document.getElementById('profile-name-input').value = state.user.name;
            document.getElementById('profile-avatar-input').value = state.user.avatar;
            document.getElementById('header-name').textContent = state.user.name;
            
            const avatarContent = state.user.avatar 
                ? `<img src="${state.user.avatar}" class="w-full h-full object-cover" />`
                : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
            
            const bigAvatarContent = state.user.avatar 
                ? `<img src="${state.user.avatar}" class="w-full h-full object-cover" />`
                : `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;

            document.getElementById('header-avatar').innerHTML = avatarContent;
            document.getElementById('profile-avatar-preview').innerHTML = bigAvatarContent;
        }

        function saveProfile() {
            state.user.name = document.getElementById('profile-name-input').value.trim() || "Reader";
            state.user.avatar = document.getElementById('profile-avatar-input').value.trim();
            updateProfileUI();
            showView('library');
        }

        // --- Dark Mode ---
        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            if (state.isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        // --- Helper Functions ---
        const formatTime = (seconds) => {
            if (isNaN(seconds) || seconds === undefined) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        // --- File Handling ---
        document.getElementById('file-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const newBook = {
                id: Date.now().toString(),
                title: file.name.replace(/\.[^/.]+$/, ""),
                author: "Unknown Author",
                coverUrl: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400&auto=format&fit=crop",
                category: "Uncategorized",
                chapters: [{ name: file.name, url: URL.createObjectURL(file) }],
                currentChapter: 0,
                progress: 0
            };
            
            state.books.push(newBook);
            e.target.value = null;
            renderLibrary();
            renderTags();
        });

        document.getElementById('folder-upload').addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('audio/'));
            if (files.length === 0) {
                alert("No audio files found in the selected folder.");
                return;
            }

            // Alphabetical sorting for chapters
            files.sort((a, b) => a.name.localeCompare(b.name));

            const chapters = files.map(file => ({
                name: file.name.replace(/\.[^/.]+$/, ""),
                url: URL.createObjectURL(file)
            }));

            const folderPath = files[0].webkitRelativePath;
            const folderName = folderPath ? folderPath.split('/')[0] : "Imported Audiobook";

            const newBook = {
                id: Date.now().toString(),
                title: folderName,
                author: "Unknown Author",
                coverUrl: "https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=400&auto=format&fit=crop",
                category: "Uncategorized",
                chapters,
                currentChapter: 0,
                progress: 0
            };

            state.books.push(newBook);
            e.target.value = null;
            renderLibrary();
            renderTags();
        });

        // --- Rendering ---
        function toggleLocalSearch() {
            const el = document.getElementById('local-search-container');
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                document.getElementById('local-search-input').focus();
            } else {
                el.classList.add('hidden');
                document.getElementById('local-search-input').value = '';
                filterLibrary();
            }
        }

        function filterLibrary() {
            state.localSearchQuery = document.getElementById('local-search-input').value.toLowerCase();
            renderLibrary();
        }

        function renderTags() {
            const categories = new Set();
            state.books.forEach(b => {
                if (b.category && b.category !== "Uncategorized") {
                    categories.add(b.category);
                }
            });

            if (categories.size === 0) {
                tagsContainer.innerHTML = `<span class="px-4 py-2 bg-gray-50 dark:bg-slate-800 text-gray-500 dark:text-gray-400 text-sm font-medium rounded-full whitespace-nowrap border border-gray-100 dark:border-slate-700">No tags yet</span>`;
                return;
            }

            tagsContainer.innerHTML = Array.from(categories).map(cat => 
                `<span class="px-4 py-2 bg-gray-50 dark:bg-slate-800 text-gray-700 dark:text-gray-200 text-sm font-medium rounded-full whitespace-nowrap border border-gray-100 dark:border-slate-700">${cat}</span>`
            ).join('');
        }

        function renderLibrary() {
            const filteredBooks = state.books.filter(b => 
                b.title.toLowerCase().includes(state.localSearchQuery) || 
                b.author.toLowerCase().includes(state.localSearchQuery)
            );

            if (state.books.length === 0) {
                booksContainer.innerHTML = `
                    <div class="text-center py-10 bg-gray-50 dark:bg-slate-800 rounded-2xl border border-dashed border-gray-200 dark:border-slate-700 md:col-span-full">
                        <svg class="mx-auto text-gray-300 dark:text-gray-600 mb-2" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                        <p class="text-gray-500 dark:text-gray-400 font-medium text-sm">No audiobooks yet.</p>
                        <p class="text-gray-400 dark:text-gray-500 text-xs mt-1">Import a file or folder to begin.</p>
                    </div>`;
                return;
            }

            if (filteredBooks.length === 0) {
                booksContainer.innerHTML = `<div class="text-center text-gray-500 dark:text-gray-400 mt-10 md:col-span-full">No books match your search.</div>`;
                return;
            }
            
            booksContainer.innerHTML = filteredBooks.map(book => `
                <div class="bg-white dark:bg-slate-900 rounded-3xl p-4 shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none border border-gray-50 dark:border-slate-800">
                    <div class="flex gap-4 relative">
                        <svg class="absolute top-0 right-0 text-gray-300 dark:text-slate-600" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                        <img src="${book.coverUrl}" alt="Cover" class="w-24 h-32 object-cover rounded-xl shadow-md bg-gray-100 dark:bg-slate-800" />
                        <div class="flex-1 pt-2 flex flex-col overflow-hidden">
                            <h4 class="font-bold text-gray-900 dark:text-white leading-tight text-lg mb-1 truncate" title="${book.title}">${book.title}</h4>
                            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium mb-auto truncate">${book.author}</p>
                            
                            <div class="flex items-center gap-3 mt-3">
                                <span class="text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-slate-800 px-2 py-1 rounded-md font-medium whitespace-nowrap">
                                    ${book.chapters.length > 1 ? `${book.chapters.length} Chaps` : 'Audio'}
                                </span>
                                <button onclick="openPlayer('${book.id}')" class="ml-auto bg-gray-900 dark:bg-violet-600 hover:bg-black dark:hover:bg-violet-700 text-white text-sm font-semibold py-2 px-5 rounded-full flex items-center gap-2 transition-transform active:scale-95">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Play
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updatePlayerUI() {
            const activeBook = state.books.find(b => b.id === state.activeBookId);
            if (!activeBook) return;

            document.getElementById('player-cover').src = activeBook.coverUrl;
            document.getElementById('player-title').textContent = activeBook.title;
            document.getElementById('player-author').textContent = `by ${activeBook.author}`;

            const chapInfo = document.getElementById('player-chapter-info');
            if (activeBook.chapters.length > 1) {
                chapInfo.classList.remove('hidden');
                const chapName = activeBook.chapters[activeBook.currentChapter].name;
                chapInfo.innerHTML = `Chapter ${activeBook.currentChapter + 1} <span class="text-gray-400 dark:text-gray-500 normal-case tracking-normal truncate inline-block align-bottom max-w-[150px]">- ${chapName}</span>`;
            } else {
                chapInfo.classList.add('hidden');
            }

            // Buttons state
            const prevBtn = document.getElementById('btn-prev-chap');
            const nextBtn = document.getElementById('btn-next-chap');
            
            prevBtn.className = `p-2 transition-colors ${activeBook.currentChapter === 0 ? 'text-gray-300 dark:text-slate-700 cursor-not-allowed' : 'text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white'}`;
            nextBtn.className = `p-2 transition-colors ${activeBook.currentChapter === activeBook.chapters.length - 1 ? 'text-gray-300 dark:text-slate-700 cursor-not-allowed' : 'text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white'}`;
        }

        function renderWaveform() {
            const duration = audioEl.duration || 100;
            const current = audioEl.currentTime || 0;
            const ratio = current / duration;
            
            const container = document.getElementById('waveform');
            container.innerHTML = state.waveformHeights.map((h, i) => {
                const opacity = ratio > (i / 40) ? 1 : 0.3;
                return `<div class="w-1 rounded-t-sm bg-violet-400 dark:bg-violet-600" style="height: ${h}%; opacity: ${opacity}; transition: opacity 0.2s;"></div>`;
            }).join('');
        }

        // --- Navigation Player ---
        function openPlayer(bookId) {
            if (state.activeBookId !== bookId) {
                saveProgress();
                state.activeBookId = bookId;
                const book = state.books.find(b => b.id === bookId);
                audioEl.src = book.chapters[book.currentChapter].url;
                audioEl.currentTime = book.progress || 0;
                audioEl.playbackRate = state.playbackRate;
                
                state.isPlaying = true;
                audioEl.play().catch(e => console.error("Auto-play prevented", e));
            }
            
            updatePlayerUI();
            updatePlayPauseIcon();
            showView('player');
        }

        function closePlayer() {
            saveProgress();
            showView('library');
        }

        // --- Playback Controls ---
        function togglePlay() {
            if (state.isPlaying) {
                audioEl.pause();
                saveProgress();
            } else {
                audioEl.play().catch(console.error);
            }
            state.isPlaying = !state.isPlaying;
            updatePlayPauseIcon();
        }

        function updatePlayPauseIcon() {
            if (state.isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            }
        }

        function skipTime(seconds) {
            audioEl.currentTime = Math.min(Math.max(audioEl.currentTime + seconds, 0), audioEl.duration || 0);
        }

        function changeChapter(direction) {
            const activeBook = state.books.find(b => b.id === state.activeBookId);
            if (!activeBook) return;

            const newIndex = activeBook.currentChapter + direction;
            if (newIndex >= 0 && newIndex < activeBook.chapters.length) {
                saveProgress();
                activeBook.currentChapter = newIndex;
                activeBook.progress = 0;
                
                audioEl.src = activeBook.chapters[newIndex].url;
                audioEl.currentTime = 0;
                if (state.isPlaying) audioEl.play().catch(console.error);
                
                updatePlayerUI();
            }
        }

        function togglePlaybackRate() {
            state.playbackRate = state.playbackRate >= 2 ? 0.5 : state.playbackRate + 0.25;
            audioEl.playbackRate = state.playbackRate;
            document.getElementById('speed-display').textContent = `${state.playbackRate}x speed`;
        }

        function saveProgress() {
            if (state.activeBookId) {
                const book = state.books.find(b => b.id === state.activeBookId);
                if (book) book.progress = audioEl.currentTime;
            }
        }

        // Audio Events
        audioEl.addEventListener('timeupdate', () => {
            const current = audioEl.currentTime;
            const duration = audioEl.duration || 0;
            
            currentTimeDisplay.textContent = formatTime(current);
            progressBar.value = current;
            
            if (duration) {
                durationDisplay.textContent = formatTime(duration);
                progressBar.max = duration;
            }
            renderWaveform();
        });

        audioEl.addEventListener('loadedmetadata', () => {
            durationDisplay.textContent = formatTime(audioEl.duration);
            progressBar.max = audioEl.duration || 100;
        });

        audioEl.addEventListener('ended', () => {
            const activeBook = state.books.find(b => b.id === state.activeBookId);
            if (!activeBook) return;

            if (activeBook.currentChapter < activeBook.chapters.length - 1) {
                changeChapter(1);
            } else {
                state.isPlaying = false;
                activeBook.progress = 0;
                activeBook.currentChapter = 0;
                audioEl.currentTime = 0;
                audioEl.src = activeBook.chapters[0].url; // Reset to start
                updatePlayPauseIcon();
                updatePlayerUI();
            }
        });

        progressBar.addEventListener('input', (e) => {
            audioEl.currentTime = e.target.value;
        });

        // --- Metadata Search & Edit ---
        const searchInput = document.getElementById('search-input');
        
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchGoogleBooks();
        });

        function openSearchModal() {
            searchModal.classList.remove('hidden');
            const activeBook = state.books.find(b => b.id === state.activeBookId);
            if (activeBook) {
                // Pre-fill manual edits and search input
                document.getElementById('manual-title').value = activeBook.title;
                document.getElementById('manual-author').value = activeBook.author !== "Unknown Author" ? activeBook.author : "";
                document.getElementById('manual-cover').value = activeBook.coverUrl;
                searchInput.value = activeBook.title;
                
                // Clear old search results
                document.getElementById('search-results').innerHTML = `
                    <div class="text-center text-gray-400 dark:text-gray-500 mt-6 text-sm flex flex-col items-center">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-50"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Search results will appear here. Click one to fill the form above.
                    </div>
                `;
            }
        }

        function closeSearchModal() {
            searchModal.classList.add('hidden');
        }

        async function searchGoogleBooks() {
            const query = searchInput.value.trim();
            if (!query) return;

            const resultsContainer = document.getElementById('search-results');
            resultsContainer.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 mt-10">Searching...</div>';

            try {
                // Generalize query and limit fields for better success
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=10&printType=books`);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    resultsContainer.innerHTML = data.items.map(item => {
                        const info = item.volumeInfo;
                        const title = info.title || 'Unknown Title';
                        const author = info.authors ? info.authors.join(', ') : 'Unknown Author';
                        const coverUrl = info.imageLinks?.thumbnail?.replace('http:', 'https:') || '';
                        const category = info.categories ? info.categories[0] : '';
                        
                        // Stringify data securely
                        const metaObj = JSON.stringify({ title, author, coverUrl, category }).replace(/"/g, '&quot;');

                        const coverImg = coverUrl 
                            ? `<img src="${coverUrl}" class="w-12 h-16 object-cover rounded shadow-sm bg-gray-100 dark:bg-slate-800" />`
                            : `<div class="w-12 h-16 bg-gray-200 dark:bg-slate-800 rounded flex items-center justify-center text-gray-400 dark:text-gray-500"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg></div>`;

                        return `
                            <div onclick="selectSearchResult('${metaObj}')" class="flex gap-4 items-center p-3 bg-white dark:bg-slate-900 hover:bg-violet-50 dark:hover:bg-slate-800 rounded-xl cursor-pointer border border-gray-100 dark:border-slate-800 hover:border-violet-200 dark:hover:border-slate-700 transition-colors">
                                ${coverImg}
                                <div>
                                    <h4 class="font-bold text-sm text-gray-900 dark:text-white line-clamp-1">${title}</h4>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${author}</p>
                                    ${category ? `<span class="text-[10px] mt-1 inline-block bg-gray-100 dark:bg-slate-800 px-2 py-0.5 rounded text-gray-500 dark:text-gray-400">${category}</span>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    resultsContainer.innerHTML = '<p class="text-center text-gray-500 dark:text-gray-400 mt-10 text-sm">No results found online. Try varying your search terms.</p>';
                }
            } catch (err) {
                console.error("Error searching books:", err);
                resultsContainer.innerHTML = '<p class="text-center text-red-500 mt-10 text-sm">Failed to search. Make sure you have an internet connection.</p>';
            }
        }

        // Fills the manual form with suggestion data
        let temporaryCategory = ""; // Temporarily hold category if web search applied
        function selectSearchResult(metaStr) {
            const meta = JSON.parse(metaStr);
            document.getElementById('manual-title').value = meta.title;
            document.getElementById('manual-author').value = meta.author !== "Unknown Author" ? meta.author : "";
            if (meta.coverUrl) document.getElementById('manual-cover').value = meta.coverUrl;
            if (meta.category) temporaryCategory = meta.category;
            
            // Visual feedback
            const btn = document.querySelector('#search-modal button.bg-slate-900');
            btn.classList.add('ring-2', 'ring-violet-500', 'ring-offset-2', 'dark:ring-offset-slate-900');
            setTimeout(() => btn.classList.remove('ring-2', 'ring-violet-500', 'ring-offset-2', 'dark:ring-offset-slate-900'), 1000);
        }

        // Saves whatever is in the manual form
        function saveManualMetadata() {
            const activeBook = state.books.find(b => b.id === state.activeBookId);
            if (activeBook) {
                activeBook.title = document.getElementById('manual-title').value.trim() || activeBook.title;
                activeBook.author = document.getElementById('manual-author').value.trim() || "Unknown Author";
                
                const coverInput = document.getElementById('manual-cover').value.trim();
                if (coverInput) activeBook.coverUrl = coverInput;

                if (temporaryCategory) {
                    activeBook.category = temporaryCategory;
                    temporaryCategory = ""; // Reset
                    renderTags();
                }
                
                updatePlayerUI();
            }
            closeSearchModal();
        }

        // Initialize empty waveform
        renderWaveform();
        updateProfileUI();
    </script>
</body>
</html>
